<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card-bg);
            padding: 2rem;
            width: 100%; maxWidth: 500px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            background: rgba(16, 185, 129, 0.2);
            color: var(--success-color);
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">EventAdmin</div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">Dashboard</a></li>
                <li class="nav-item"><a href="events.html" class="nav-link active">Events</a></li>
                <li class="nav-item"><a href="users.html" class="nav-link">Users</a></li>
            </ul>
            <button onclick="api.logout()" class="btn btn-danger" style="width: 100%; margin-top: auto;">Logout</button>
        </aside>

        <main class="main-content animate-fade-in">
            <header class="flex justify-between items-center mb-4">
                <h1>Manage Events</h1>
                <button class="btn btn-primary" onclick="openEventModal()">+ Create Event</button>
            </header>

            <div class="glass-panel" style="padding: 1.5rem;">
                <div class="table-container">
                    <table id="eventsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Location</th>
                                <th>Dates</th>
                                <th>Description</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Rendered rows -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Event Modal (Add/Edit) -->
    <div class="modal" id="eventModal">
        <div class="modal-content animate-fade-in">
            <h2 id="modalTitle">Create Event</h2>
            <form id="eventForm">
                <input type="hidden" id="eventId">
                <div class="input-group">
                    <label>Event Name</label>
                    <input type="text" id="eventName" required>
                </div>
                <div class="input-group">
                    <label>Description</label>
                    <textarea id="eventDesc" rows="3" required></textarea>
                </div>
                <div class="input-group">
                    <label>Location</label>
                    <input type="text" id="eventLocation" required>
                </div>
                <div class="input-group">
                    <label>Date & Time</label>
                    <input type="datetime-local" id="eventDate" required>
                </div>
                <div class="flex gap-4 mt-4">
                    <button type="button" class="btn" onclick="closeEventModal()" style="background: rgba(255,255,255,0.1);">Cancel</button>
                    <button type="submit" class="btn btn-primary flex-1">Save Event</button>
                </div>
            </form>
        </div>
    </div>

    <script src="env-config.js"></script>
    <script src="js/api.js"></script>
    <script>
        if (!api.isAuthenticated()) window.location.href = 'login.html';

        let events = [];

        async function loadEvents() {
            try {
                const res = await api.getEvents();
                events = res.eventList || [];
                renderEvents();
            } catch (err) {
                alert("Failed to load events: " + err.message);
            }
        }

        function renderEvents() {
            const tbody = document.querySelector('#eventsTable tbody');
            tbody.innerHTML = '';
            
            if (events.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No events found</td></tr>';
                return;
            }

            events.forEach(event => {
                // Format dates array
                let dateStr = '-';
                if (event.dates && event.dates.length > 0) {
                    dateStr = event.dates.map(d => new Date(d).toLocaleString()).join(', ');
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${event.eventId || '-'}</td>
                    <td><strong>${event.name || '-'}</strong></td>
                    <td>${event.location || '-'}</td>
                    <td>${dateStr}</td>
                    <td>${event.description || '-'}</td>
                    <td>
                        <button class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.8rem; background: rgba(255,255,255,0.1);" onclick="editEvent('${event.eventId}')">Edit</button>
                        <button class="btn btn-danger" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;" onclick="deleteEvent('${event.eventId}')">Del</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openEventModal() {
            document.getElementById('modalTitle').textContent = 'Create Event';
            document.getElementById('eventForm').reset();
            document.getElementById('eventId').value = '';
            document.getElementById('eventModal').classList.add('active');
        }

        function closeEventModal() {
            document.getElementById('eventModal').classList.remove('active');
        }

        function editEvent(eventId) {
            const event = events.find(e => e.eventId === eventId);
            if (!event) return;

            document.getElementById('modalTitle').textContent = 'Edit Event';
            document.getElementById('eventId').value = event.eventId;
            document.getElementById('eventName').value = event.name || '';
            document.getElementById('eventDesc').value = event.description || '';
            document.getElementById('eventLocation').value = event.location || '';
            
            // Format datetime-local string from first date
            if (event.dates && event.dates.length > 0) {
                const dt = new Date(event.dates[0]);
                dt.setMinutes(dt.getMinutes() - dt.getTimezoneOffset());
                document.getElementById('eventDate').value = dt.toISOString().slice(0,16);
            }

            document.getElementById('eventModal').classList.add('active');
        }

        document.getElementById('eventForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('eventId').value;
            const dateVal = document.getElementById('eventDate').value;
            const eventData = {
                name: document.getElementById('eventName').value,
                description: document.getElementById('eventDesc').value,
                location: document.getElementById('eventLocation').value,
                dates: [dateVal.length === 16 ? dateVal + ':00' : dateVal]
            };

            try {
                if (id) {
                    eventData.eventId = id;
                    await api.updateEvent(eventData);
                } else {
                    await api.addEvent(eventData);
                }
                closeEventModal();
                loadEvents(); // Reload table
            } catch (err) {
                alert("Error saving event: " + err.message);
            }
        });

        async function deleteEvent(eventId) {
            if (confirm("Are you sure you want to delete this event? This action cannot be undone.")) {
                try {
                    await api.deleteEvent(eventId);
                    loadEvents();
                } catch(err) {
                    alert("Failed to delete event: " + err.message);
                }
            }
        }

        loadEvents();
    </script>
</body>
</html>
