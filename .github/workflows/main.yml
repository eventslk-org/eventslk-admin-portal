name: Build and Push Admin Portal

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          # Build and push the SHA-tagged image for traceability
          docker build -t kaveengayanga12/eventslk-admin-portal:${{ github.sha }} .
          docker push kaveengayanga12/eventslk-admin-portal:${{ github.sha }}

          # Also tag as 'latest' so the cluster can pull without knowing the SHA
          docker tag kaveengayanga12/eventslk-admin-portal:${{ github.sha }} kaveengayanga12/eventslk-admin-portal:latest
          docker push kaveengayanga12/eventslk-admin-portal:latest

      - name: Update K8s Manifests
        run: |
          # Remove any leftover directory from a previous failed run to avoid clone conflicts
          rm -rf eventslk-k8s-manifests

          # Clone using x-access-token so the remote URL already carries write permissions,
          # which covers both the clone and the subsequent git push without extra configuration
          # git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/eventslk-org/eventslk-k8s-manifests.git
          # cd eventslk-k8s-manifests

          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/eventslk-org/eventslk-k8s-manifests.git
          cd eventslk-k8s-manifests

          # Update the admin portal deployment image tag to the current commit SHA
          # sed -i "s|image: kaveengayanga12/eventslk-admin-portal:.*|image: kaveengayanga12/eventslk-admin-portal:${{ github.sha }}|" admin-portal-deployment.yaml

          sed -i "s|image: kaveengayanga12/eventslk-admin-portal:.*|image: kaveengayanga12/eventslk-admin-portal:${{ github.sha }}|" admin-portal-deployment.yaml

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update admin portal image to ${{ github.sha }}"

          # Rebase against remote main before pushing to prevent 403/conflict errors
          # when multiple service workflows update the manifest repo simultaneously
          git pull --rebase origin main

          git push https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/eventslk-org/eventslk-k8s-manifests.git main
